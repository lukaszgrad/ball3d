cameras: [1, 2, 3, 4, 5, 6]
counts_threshold: 500
score_threshold: 0.2
triangulation_threshold_dm: 8
dbscan_epsilon: 20
dbscan_min_samples: 3
z_upper_bound: null  # auto: 3 (garbage rejection threshold, same for both modes)
z_clamp_threshold: null  # auto: -1 for center, 0 for bottom_center
detection_name: detection
detection_point: center  # "center" (bbox center) or "bottom_center" (bbox bottom-middle)
z_compensate_radius: true  # subtract 1dm for ball radius; false for bottom_center
reject_behind_camera: true
parallel_ray_threshold: 1e-8
method: multi_ray_ransac
ransac_iterations: 20
ransac_inlier_threshold_dm: 8
min_cameras: 3
reprojection_filter: true
reprojection_threshold_px: 15
reprojection_min_cameras: 2
temporal_gap_fill: true
temporal_gap_max_frames: 3
save_filtered_detections: true
filtered_detection_suffix: dl_filtered
